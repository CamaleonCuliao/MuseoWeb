<header>
    <h1 routerLink="">MuseumWeb</h1>
    <button class="hamburger" (click)="toggleMenu()" aria-label="Abrir menú">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <nav [class.open]="menuAbierto">
        <ul>
            <li routerLink="">Inicio</li>
            <li routerLink="/detalles-museo">Museos</li>
            <li>Yacimientos</li>
            <li>Exposiciones</li>
            <li>Noticias</li>
            <li>Contacto</li>
            @if(cosa){
                <li>Cuenta</li>
                <li (click)="cerrarSesion()">Cerrar sesion</li>
            }
            @if(!cosa){
                <li routerLink="/registro">Crear cuenta</li>
                <li routerLink="/inicio">Iniciar sesion</li>
            }
            
        </ul>
    </nav>
</header>

<style>

:host {
    display: block;
    position: sticky;
    top: 0;
    z-index: 9999;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #faf7f3;
    padding: 0 1rem;
    height: 56px;    
}

h1 {
    margin: 0;
    font-size: 20px;
}

.hamburger {
    display: flex;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
}

.hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background-color: #1a1a1a;
    border-radius: 2px;
}

nav {
    display: none;
    background-color: #D0D5ED;
    position: absolute;
    top: 56px;
    left: 0;
    width: 100%;
    border-top: 0.5px solid rgba(0, 0, 0, 0.1);

    z-index: 10000; /* 👈 para que el menú no quede debajo */
}

nav.open {
    display: block;
}

ul {
    margin: 0;
    padding: 0.5rem 0;
    list-style: none;
}

li {
    padding: 12px 1.25rem;
    font-size: 15px;
    border-bottom: 0.5px solid rgba(0, 0, 0, 0.07);
    cursor: pointer;
}

li:last-child {
    border-bottom: none;
}
